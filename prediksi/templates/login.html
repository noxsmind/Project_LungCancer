<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PulmoDetect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float-1 { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(25px, 40px) scale(1.1); } 100% { transform: translate(0, 0) scale(1); } }
        @keyframes float-2 { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-30px, -30px) scale(1.05); } 100% { transform: translate(0, 0) scale(1); } }
        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .bubble-pink { background: radial-gradient(circle at 30% 30%, rgba(252, 165, 165, 0.5), rgba(252, 165, 165, 0.2)); filter: blur(40px); }
        .bubble-blue { background: radial-gradient(circle at 30% 30%, rgba(147, 197, 253, 0.5), rgba(147, 197, 253, 0.2)); filter: blur(40px); }
        
        /* Mempercantik kotak input bawaan Django */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 0.875rem; border-radius: 1rem; border: 2px solid #f3f4f6; background-color: #f9fafb; outline: none; transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #f472b6; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-pink-200">

    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-10 -left-10 w-96 h-96 rounded-full bubble-pink" style="animation: float-1 8s ease-in-out infinite, rotate-slow 20s linear infinite;"></div>
        <div class="absolute bottom-10 -right-10 w-[30rem] h-[30rem] rounded-full bubble-blue" style="animation: float-2 10s ease-in-out infinite, rotate-slow 25s linear infinite reverse;"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-2xl p-10 rounded-[2.5rem] shadow-2xl border border-white w-full max-w-md relative z-10 transform transition hover:shadow-pink-500/10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-100 to-pink-100 rounded-2xl mb-4 border border-white shadow-sm">
                <svg class="w-10 h-10 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-pink-500">Selamat Datang</h1>
            <p class="text-gray-500 mt-2 font-medium">Masuk ke akun PulmoDetect Anda</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold mb-6 border border-red-100 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Username atau password salah!
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">Username</label>
                <input type="text" name="username" required placeholder="Ketik username Anda">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">Password</label>
                <input type="password" name="password" required placeholder="Ketik sandi Anda">
            </div>

            <button type="submit" class="w-full mt-8 bg-gradient-to-r from-blue-600 to-pink-500 hover:from-blue-700 hover:to-pink-600 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-pink-500/40 transform hover:-translate-y-1">
                Masuk Sekarang
            </button>
        </form>

        <p class="mt-8 text-center text-sm font-medium text-gray-600">
            Belum punya akun? <br>
            <a href="{% url 'register' %}" class="text-pink-500 hover:text-blue-600 font-bold transition-colors underline decoration-2 underline-offset-4">Daftar secara gratis di sini</a>
        </p>
    </div>

</body>
</html>
